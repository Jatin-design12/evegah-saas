version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: evegah_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evegah_user
      POSTGRES_PASSWORD: evegah_pass
      POSTGRES_DB: evegah_db
    ports:
      - '5432:5432'
    volumes:
      - evegah_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: evegah_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@evegah.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  evegah_pgdata:
